# nixpacks.toml

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "PLAYWRIGHT_BROWSERS_PATH=/app/.cache/ms-playwright playwright install --with-deps chromium"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.cache/ms-playwright"
PYTHONUTF8 = "1"
PYTHONIOENCODING = "utf-8"
LANG = "en_US.UTF-8"
LC_ALL = "en_US.UTF-8"
